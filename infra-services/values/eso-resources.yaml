resources:
  - apiVersion: external-secrets.io/v1beta1
    kind: SecretStore
    metadata:
      name: vault-backend
      namespace: media-downloader
    spec:
      provider:
        vault:
          server: "http://vault.vault:8200"
          path: "media-downloader"
          version: "v2"
          auth:
            tokenSecretRef:
              name: vault-token
              key: token

  - apiVersion: external-secrets.io/v1beta1
    kind: ExternalSecret
    metadata:
      name: postgresql-credentials
      namespace: media-downloader
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: vault-backend
        kind: SecretStore
      target:
        name: postgresql-credentials
        creationPolicy: Owner
      data:
        - secretKey: password
          remoteRef:
            key: postgresql
            property: password

  - apiVersion: external-secrets.io/v1beta1
    kind: ExternalSecret
    metadata:
      name: rabbitmq-credentials
      namespace: media-downloader
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: vault-backend
        kind: SecretStore
      target:
        name: rabbitmq-credentials
        creationPolicy: Owner
      data:
        - secretKey: password
          remoteRef:
            key: rabbitmq
            property: password

  - apiVersion: external-secrets.io/v1beta1
    kind: ExternalSecret
    metadata:
      name: minio-credentials
      namespace: media-downloader
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: vault-backend
        kind: SecretStore
      target:
        name: minio-credentials
        creationPolicy: Owner
      data:
        - secretKey: rootPassword
          remoteRef:
            key: minio
            property: rootPassword

  - apiVersion: external-secrets.io/v1beta1
    kind: ExternalSecret
    metadata:
      name: redis-credentials
      namespace: media-downloader
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: vault-backend
        kind: SecretStore
      target:
        name: redis-credentials
        creationPolicy: Owner
      data:
        - secretKey: password
          remoteRef:
            key: redis
            property: password
