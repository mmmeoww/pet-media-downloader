mode: standalone

rootUser: admin
existingSecret: minio-credentials

persistence:
  enabled: true
  size: 50Gi
  storageClass: local-path

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

service:
  type: ClusterIP
  port: 9000
  consolePort: 9001

metrics:
  enabled: false
  serviceMonitor:
    enabled: false

buckets:
  - name: downloads
    policy: private
  - name: converted
    policy: private
  - name: thumbnails
    policy: private
