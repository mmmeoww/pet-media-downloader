image:
  repository: docker.io/library/redis
  tag: "7-alpine"
  pullPolicy: IfNotPresent

architecture: standalone

auth:
  enabled: true
  existingSecret: redis-credentials
  existingSecretPasswordKey: REDIS_PASSWORD

standalone:
  persistence:
    enabled: true
    size: 1Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics:
  enabled: false

podSecurityContext:
  fsGroup: 0

securityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    drop:
      - ALL
