image:
  repository: docker.io/library/rabbitmq
  tag: "4.3.2-alpine"
  pullPolicy: IfNotPresent

architecture: single-node

auth:
  username: media_downloader
  vhost: /
  existingSecret: rabbitmq-credentials
  existingSecretPasswordKey: rabbitmq-password
  existingSecretErlangCookieKey: rabbitmq-erlang-cookie

queueDefaults:
  type: quorum

management:
  enabled: true

singleNode:
  persistence:
    enabled: true
    size: 5Gi
    storageClass: local-path
    accessMode: ReadWriteOnce

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  extra: |
    load_definitions = /app/definitions.json

extraVolumes:
  - name: definitions
    configMap:
      name: rabbitmq-definitions

extraVolumeMounts:
  - name: definitions
    mountPath: /app/definitions.json
    subPath: definitions.json

metrics:
  enabled: false
