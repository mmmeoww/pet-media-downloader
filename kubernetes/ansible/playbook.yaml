---
- name: Container runtime and packages
  hosts: k8s
  become: yes
  roles:
    - packages
    - containerd

- name: Initialize control plane
  hosts: control-plane
  become: yes
  roles:
    - kubernetes-master

- name: Join workers
  hosts: workers
  become: yes
  roles:
    - kubernetes-worker

- name: Install network plugin
  hosts: control-plane
  become: yes
  roles:
    - network-plugin

- name: Fetch local kubeconfig
  hosts: control-plane
  become: yes
  roles:
    - kubeconfig
