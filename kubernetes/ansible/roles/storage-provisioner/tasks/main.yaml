- name: Copy local-path-provisioner chart to remote
  ansible.builtin.copy:
    src: chart/
    dest: /tmp/local-path-provisioner-chart/

- name: Install local-path-provisioner helm chart
  ansible.builtin.shell: |
    helm upgrade --install local-path-provisioner /tmp/local-path-provisioner-chart \
      --namespace local-path-storage \
      --create-namespace

- name: Wait for local-path-provisioner pod
  ansible.builtin.shell: |
    kubectl wait --for=condition=ready pod \
      -n local-path-storage -l app=local-path-provisioner \
      --timeout=30s
  register: provisioner_pod
  retries: 6
  delay: 10
  until: provisioner_pod.rc == 0
