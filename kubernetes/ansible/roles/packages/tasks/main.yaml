---
- name: Update apt caches
  apt:
    update_cache: yes
    cache_valid_time: 7200

- name: default packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - curl
    - nano
    - ca-certificates
    - gnupg
    - socat
    - conntrack
    - ethtool

- name: Add k8s GPG key
  ansible.builtin.shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/{{ k8s_repo_version }}/deb/Release.key |
      gpg --dearmor -o /usr/share/keyrings/kubernetes-archive-keyring.gpg
  args:
    executable: /bin/bash
    creates: /usr/share/keyrings/kubernetes-archive-keyring.gpg

- name: Add k8s apt repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/kubernetes-archive-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ k8s_repo_version }}/deb/ /"
    state: present
    filename: kubernetes

- name: install k8s packages
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - kubelet
    - kubeadm

- name: install kubectl to control plane
  ansible.builtin.apt:
    name: kubectl
    state: present
  when: inventory_hostname in groups['control-plane']

- name: install helm
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  when: inventory_hostname in groups['control-plane']

- name: hold pckgs version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm

- name: Enable  and start kubelet
  ansible.builtin.systemd_service:
    name: kubelet
    state: started
    enabled: yes
    daemon_reload: yes
