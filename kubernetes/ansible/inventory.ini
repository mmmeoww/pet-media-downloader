[control-plane]
control-plane ansible_host=192.168.56.11 ansible_ssh_private_key_file=.vagrant/machines/control_plane/virtualbox/private_key

[workers]
worker01 ansible_host=192.168.56.12 ansible_ssh_private_key_file=.vagrant/machines/worker01/virtualbox/private_key
; worker02 ansible_host=192.168.56.13 ansible_ssh_private_key_file=.vagrant/machines/worker02/virtualbox/private_key

[k8s:children]
control-plane
workers

[all:vars]
ansible_connection=ssh
ansible_user=vagrant
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes'