[control-plane]
control-plane ansible_host=127.0.0.1 ansible_port=50022 ansible_ssh_private_key_file=.vagrant/machines/control_plane/qemu/private_key

[workers]
worker01 ansible_host=127.0.0.1 ansible_port=50023 ansible_ssh_private_key_file=.vagrant/machines/worker01/qemu/private_key
; worker02 ansible_host=127.0.0.1 ansible_port=50024 ansible_ssh_private_key_file=.vagrant/machines/worker02/qemu/private_key

[k8s:children]
control-plane
workers

[all:vars]
ansible_connection=ssh
ansible_user=vagrant
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes'
