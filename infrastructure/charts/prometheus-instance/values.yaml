serviceAccount:
  name: prometheus

replicas: 1

image:
  repository: quay.io/prometheus/prometheus
  tag: v3.13.1

retention: 10d
retentionSize: 8GiB

resources: {}

storage:
  storageClassName: local-path
  size: 10Gi

volumePermissions:
  enabled: true
  image:
    repository: docker.io/library/busybox
    tag: "1.36"
    pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9090

serviceMonitorSelector: {}

serviceMonitorNamespaceSelector: {}

podMonitorSelector: {}

podMonitorNamespaceSelector: {}

ruleSelector: {}

ruleNamespaceSelector: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 2000
  fsGroup: 2000
